<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SATPAM-Q Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Merriweather:wght@400;700&family=Raleway:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="navbar">
            <div class="container navbar-container">
                <span class="brand">SATPAM-Q</span>
                <button id="btnLogout" class="btn btn-ghost btn-small hidden">
                    Keluar
                </button>
            </div>
        </header>

        <main class="container main-content">
            <!-- LOGIN SECTION -->
            <section id="login-section" class="login-container">
                <div class="card login-card">
                    <h2 class="card-title text-center mb-4">Akses Peternak</h2>
                    <div class="form-group">
                        <label for="email">Alamat Email</label>
                        <input
                            type="email"
                            class="input-text"
                            id="email"
                            placeholder="nama@email.com"
                        />
                    </div>
                    <div class="form-group">
                        <label for="password">Kata Sandi</label>
                        <input
                            type="password"
                            class="input-text"
                            id="password"
                            placeholder="********"
                        />
                    </div>
                    <button
                        id="btnLogin"
                        class="btn btn-primary btn-large w-full"
                    >
                        Masuk Dashboard
                    </button>
                    <div
                        id="login-error"
                        class="text-error mt-12 text-center small hidden"
                    ></div>
                </div>
            </section>

            <!-- DASHBOARD SECTION -->
            <section id="dashboard-section" class="dashboard-container hidden">
                <div class="section-header">
                    <h3>Data Real-Time Kandang</h3>
                </div>
                <div class="grid-2">
                    <div class="card text-center data-card">
                        <p class="overline text-muted">SUHU KANDANG</p>
                        <div class="data-value" id="val-suhu">
                            --<span class="data-unit">°C</span>
                        </div>
                    </div>
                    <div class="card text-center data-card">
                        <p class="overline text-muted">KADAR AMONIA (MQ-135)</p>
                        <div class="data-value" id="val-amonia">
                            --<span class="data-unit"> PPM</span>
                        </div>
                    </div>
                </div>

                <div class="section-header mt-48">
                    <h3>Grafik Analisis Riwayat (Kondisi Terakhir)</h3>
                </div>
                <div class="card chart-card">
                    <div class="chart-wrapper">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>

                <div class="control-header mt-48 flex-between">
                    <h3>Kendali Aktuator</h3>
                    <div class="switch-wrapper">
                        <span id="mode-label" class="mode-label auto-mode"
                            >Mode: OTOMATIS</span
                        >
                        <label class="switch">
                            <input type="checkbox" id="mode-switch" />
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card text-center control-card">
                        <p class="overline text-muted">
                            Sirkulasi Udara (Kipas)
                        </p>
                        <h3 id="status-kipas" class="status-text text-muted">
                            Memuat...
                        </h3>
                        <button
                            id="btn-kipas"
                            class="btn btn-secondary btn-large w-full"
                            disabled
                        >
                            Mohon Tunggu
                        </button>
                    </div>
                    <div class="card text-center control-card">
                        <p class="overline text-muted">
                            Penurun Amonia (Mist Sprayer)
                        </p>
                        <h3 id="status-sprayer" class="status-text text-muted">
                            Memuat...
                        </h3>
                        <button
                            id="btn-sprayer"
                            class="btn btn-secondary btn-large w-full"
                            disabled
                        >
                            Mohon Tunggu
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <script type="module" src="app.js"></script>
    </body>
</html>
